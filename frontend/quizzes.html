<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laster quiz...</title>

    <link rel="stylesheet" href="quizzes.css"> 
</head>
<body>
    <main>
        <div id="intro-screen" class="visible">
            <h1 id="quiz-name">Quiz navn</h1>
            <h3 id="quiz-difficulty">Lett</h3>
        </div>
        <div id="question-screen">
            <h2 id="timer">10 sekunder</h2>
            <h1 id="question-text">Spørsmål tekst</h1>
            <div id="answer-list">

            </div>
            <div id="cheats">
                <button id="remove-half">50 : 50</button>
                <button id="add-time">+10 sekunder</button>
            </div>
        </div>
        <div id="end-screen">
            <h1>Gratulerer!</h1>
            <h3>Du fikk <span id="point-amount">2/3</span> poeng</h3>
            <h4 id="feedback">Godt jobbet!</h4>
            <a href="/frontend/index.html"><button id="new-quiz">VELG EN NY QUIZ</button></a>
        </div>
    </main>

</body>
<script src="quizzes.js"></script>
</html>
